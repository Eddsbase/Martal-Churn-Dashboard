function PersonCharts({accounts,perf}){
  const crTrend=useMemo(()=>personCR(accounts),[accounts]);
  const moAc=useMemo(()=>personMonthly(accounts),[accounts]);
  const active=accounts.filter(a=>!a.end).length,lost=accounts.filter(a=>a.end).length,total=accounts.length;
  const cr=total?((lost/total)*100).toFixed(1):0;
  const latest=crTrend[crTrend.length-1];
  const avg12=crTrend.slice(-12);
  const avgCR=avg12.length?(avg12.reduce((s,d)=>s+d.cr,0)/avg12.length).toFixed(1):"-";
  const cs=churnScore(accounts);
  return(
    <div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
        <Stat label="Active Accounts" value={active} color="#3a8c0f"/>
        <Stat label="Churned" value={lost} color="#f87171"/>
        <Stat label="Acct Churn Rate" value={cr+"%"} color={crCol(parseFloat(cr))} sub="churned / total"/>
        <Stat label="Latest Monthly CR" value={latest?latest.cr+"%":"-"} color={crCol(latest?latest.cr:null)} sub={latest?latest.m:""}/>
        <Stat label="12-Mo Avg CR" value={avgCR+"%"} color="#8dc63f"/>
        <Stat label="Churn Score" value={cs} color={cs<15?"#3a8c0f":cs<35?"#8dc63f":"#bcd97a"} sub="lower = better"/>
      </div>
      {crTrend.length>0&&<div style={CS}><SL>Churn Rate Trend</SL><ResponsiveContainer width="100%" height={130}><BarChart data={crTrend}><CartesianGrid strokeDasharray="3 3" stroke={B2}/><XAxis dataKey="m" tick={{fill:MU,fontSize:9,fontFamily:FN}}/><YAxis tick={{fill:MU,fontSize:10,fontFamily:FN}} tickFormatter={v=>v+"%"}/><Tooltip {...TT} formatter={v=>v+"%"}/><Bar dataKey="cr" radius={[3,3,0,0]}>{crTrend.map((d,i)=><Cell key={i} fill={crCol(d.cr)}/>)}</Bar></BarChart></ResponsiveContainer></div>}
      {moAc.length>0&&<div style={CS}><SL>Active Accounts Trend</SL><ResponsiveContainer width="100%" height={100}><LineChart data={moAc}><CartesianGrid strokeDasharray="3 3" stroke={B2}/><XAxis dataKey="m" tick={{fill:MU,fontSize:9,fontFamily:FN}}/><YAxis tick={{fill:MU,fontSize:10,fontFamily:FN}}/><Tooltip {...TT}/><Line type="monotone" dataKey="ac" stroke="#34d399" strokeWidth={2} dot={false}/></LineChart></ResponsiveContainer></div>}
      {perf&&perf.length>0&&<div style={CS}><SL>MQL / SQL / Meetings Trend</SL><ResponsiveContainer width="100%" height={130}><LineChart data={perf}><CartesianGrid strokeDasharray="3 3" stroke={B2}/><XAxis dataKey="m" tick={{fill:MU,fontSize:9,fontFamily:FN}}/><YAxis tick={{fill:MU,fontSize:10,fontFamily:FN}}/><Tooltip {...TT}/><Legend wrapperStyle={{color:MU,fontSize:11,fontFamily:FN}}/><Line type="monotone" dataKey="mql" name="MQLs" stroke="#a78bfa" strokeWidth={2} dot={false} connectNulls/><Line type="monotone" dataKey="sql" name="SQLs" stroke="#38bdf8" strokeWidth={2} dot={false} connectNulls/><Line type="monotone" dataKey="mtg" name="Meetings" stroke="#34d399" strokeWidth={2} dot={false} connectNulls/></LineChart></ResponsiveContainer></div>}
      <div style={CS}><SL>{"Account Detail \u2014 "+total+" accounts"}</SL><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,fontFamily:FN}}><thead><tr style={{borderBottom:"1px solid "+B2}}>{["Account","Start","Status","Reason","Reps"].map(h=><th key={h} style={{padding:"6px 10px",textAlign:"left",color:MU,fontWeight:700,fontSize:9,letterSpacing:"1px",textTransform:"uppercase"}}>{h}</th>)}</tr></thead><tbody>{[...accounts].sort((a,b)=>a.end?1:-1).map((a,i)=><tr key={i} style={{borderBottom:"1px solid "+BD,background:i%2?C3:"transparent"}}><td style={{padding:"7px 10px",color:TX,fontWeight:500}}>{a.name}</td><td style={{padding:"7px 10px",color:MU,fontSize:11}}>{a.start}</td><td style={{padding:"7px 10px"}}>{a.end?<Pill label={"Churned "+a.end} color="#ef4444"/>:<Pill label="Active" color={G}/>}</td><td style={{padding:"7px 10px"}}>{a.reason?<Pill label={a.reason} color={rsnCol(a.reason)}/>:<span style={{color:M2}}>{"\u2014"}</span>}</td><td style={{padding:"7px 10px",color:MU,fontSize:11}}>{a.reps?a.reps.join(", "):"\u2014"}</td></tr>)}</tbody></table></div></div>
    </div>
  );
}

  const rA=CD.find(d=>d.m===cA),rB=CD.find(d=>d.m===cB);

      <div style={CS}><SL>Churn Rate % — Lost / Avg Active (prior 3 months)</SL><ResponsiveContainer width="100%" height={140}><BarChart data={r18.filter(d=>d.cr!=null)}><CartesianGrid strokeDasharray="3 3" stroke={B2}/><XAxis dataKey="m" tick={{fill:MU,fontSize:9,fontFamily:FN}}/><YAxis tick={{fill:MU,fontSize:10,fontFamily:FN}} tickFormatter={v=>v+"%"}/><Tooltip {...TT} formatter={v=>v+"%"}/><Bar dataKey="cr" radius={[3,3,0,0]}>{r18.filter(d=>d.cr!=null).map((d,i)=><Cell key={i} fill={crCol(d.cr)}/>)}</Bar></BarChart></ResponsiveContainer></div>
      <div style={CS}><SL>MRR Trend — 18 Months</SL><ResponsiveContainer width="100%" height={120}><LineChart data={r18}><CartesianGrid strokeDasharray="3 3" stroke={B2}/><XAxis dataKey="m" tick={{fill:MU,fontSize:9,fontFamily:FN}}/><YAxis tick={{fill:MU,fontSize:10,fontFamily:FN}} tickFormatter={v=>v+"K"}/><Tooltip {...TT} formatter={v=>v+"K"}/><Line type="monotone" dataKey="mrr" stroke={G} strokeWidth={2.5} dot={false}/></LineChart></ResponsiveContainer></div>
      <div style={CS}><SL>Active Clients</SL><ResponsiveContainer width="100%" height={110}><LineChart data={r18}><CartesianGrid strokeDasharray="3 3" stroke={B2}/><XAxis dataKey="m" tick={{fill:MU,fontSize:9,fontFamily:FN}}/><YAxis tick={{fill:MU,fontSize:10,fontFamily:FN}}/><Tooltip {...TT}/><Line type="monotone" dataKey="ac" stroke="#38bdf8" strokeWidth={2.5} dot={false}/></LineChart></ResponsiveContainer></div>
      <div style={CS}><SL>Closed vs Lost</SL><ResponsiveContainer width="100%" height={120}><BarChart data={r18}><CartesianGrid strokeDasharray="3 3" stroke={B2}/><XAxis dataKey="m" tick={{fill:MU,fontSize:9,fontFamily:FN}}/><YAxis tick={{fill:MU,fontSize:10,fontFamily:FN}}/><Tooltip {...TT}/><Legend wrapperStyle={{color:MU,fontSize:11,fontFamily:FN}}/><Bar dataKey="dc" name="Closed" fill={G} radius={[3,3,0,0]}/><Bar dataKey="cl" name="Lost" fill="#ef4444" radius={[3,3,0,0]}/></BarChart></ResponsiveContainer></div>
      <div style={CS}><SL>Period Comparison</SL><div style={{display:"flex",gap:12,marginBottom:14,flexWrap:"wrap"}}>{[["Period A",cA,setA],["Period B",cB,setB]].map(([l,v,s])=><div key={l} style={{flex:1,minWidth:140}}><div style={{color:MU,fontSize:9,marginBottom:5,textTransform:"uppercase",letterSpacing:"1px",fontWeight:700,fontFamily:FN}}>{l}</div><select value={v} onChange={e=>s(e.target.value)} style={ss}>{CD.map(d=><option key={d.m} value={d.m}>{d.m}</option>)}</select></div>)}</div>
      {rA&&rB&&<table style={{width:"100%",borderCollapse:"collapse",fontSize:13,fontFamily:FN}}><thead><tr style={{borderBottom:"1px solid "+B2}}>{["Metric","A","B","Delta"].map(h=><th key={h} style={{padding:"7px 10px",textAlign:"left",color:MU,fontWeight:700,fontSize:9,textTransform:"uppercase",letterSpacing:"1px"}}>{h}</th>)}</tr></thead><tbody>{[{l:"MRR",k:"mrr",f:v=>v+"K",bad:false},{l:"Active Clients",k:"ac",f:v=>v,bad:false},{l:"Deals Closed",k:"dc",f:v=>v,bad:false},{l:"Contracts Lost",k:"cl",f:v=>v,bad:true},{l:"Churn %",k:"cr",f:v=>v!=null?v+"%":"\u2014",bad:true},{l:"EBITDA",k:"eb",f:v=>v+"K",bad:false}].map(row=>{const d=dlt(rA,rB,row.k);const clr=d?((row.bad?(d.v<0):(d.v>0))?G:(row.bad?(d.v>0):(d.v<0))?"#ef4444":MU):MU;return <tr key={row.k} style={{borderBottom:"1px solid "+BD}}><td style={{padding:"8px 10px",color:MU}}>{row.l}</td><td style={{padding:"8px 10px",color:TX}}>{row.f(rA[row.k])}</td><td style={{padding:"8px 10px",color:TX}}>{row.f(rB[row.k])}</td><td style={{padding:"8px 10px",color:clr,fontWeight:700}}>{d?(d.v>0?"+":"")+(typeof d.v==="number"&&!Number.isInteger(d.v)?d.v.toFixed(2):d.v)+" ("+d.pct+"%)":"\u2014"}</td></tr>;})}</tbody></table>}</div>
    </div>
  );
}

function RepsTab(){

      {sel?(<div><div style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid "+BD}}><div style={{color:TX,fontSize:20,fontWeight:800,letterSpacing:"-0.5px",fontFamily:FN}}>{sel}</div><div style={{color:MU,fontSize:11,marginTop:4,fontFamily:FN}}>{"Sales Execution Rep"+DOT}<span style={{color:G,fontWeight:700}}>{accs.filter(a=>!a.end).length}</span>{" active accounts"+DOT}{somN.join(", ")||"\u2014"}</div></div>{accs.length>0?<PersonCharts accounts={accs} perf={null}/>:<div style={{...CS,color:MU,fontSize:13,fontFamily:FN}}>No account assignments found for this rep.</div>}</div>):(<div style={{color:M2,fontSize:13,padding:"48px 0",textAlign:"center",fontFamily:FN}}>Select a rep above to load their dashboard.</div>)}

}
