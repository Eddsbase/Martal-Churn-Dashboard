function getRepAccounts(rn){const a=[];SOMS.forEach(s=>{s.accounts.forEach(ac=>{if(ac.reps&&ac.reps.includes(rn))a.push({...ac,som:s.name});});});return a;}
function personMonthly(accs){return ALL_M.map(m=>{const mi=mIdx(m);let ac=0,cl=0;accs.forEach(a=>{const s=mIdx(a.start),e=a.end?mIdx(a.end):Infinity;if(s<=mi){if(!a.end)ac++;else if(e===mi)cl++;else if(e>mi)ac++;}});return{m,ac,cl};}).filter(d=>d.ac>0||d.cl>0);}
function personCR(accs){return withCR(personMonthly(accs)).filter(d=>d.cr!==null&&d.ac>0);}

// ── CHART HELPERS ──
let charts={};
function makeChart(id,cfg){if(charts[id]){charts[id].destroy();}const ctx=document.getElementById(id);if(!ctx)return;charts[id]=new Chart(ctx,cfg);}

function statHTML(label,value,color,sub){
  return `<div class="stat"><div class="stat-bar" style="background:${color||'#5aab1f'}"></div><div class="stat-label">${label}</div><div class="stat-value" style="color:${color||'#0d0d0d'}">${value!=null?value:'-'}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`;
}
function pillHTML(label,color){return `<span class="pill" style="background:${color}15;color:${color};border:1px solid ${color}35">${label}</span>`;}

function accountTableHTML(accounts){
  const sorted=[...accounts].sort((a,b)=>a.end?1:-1);
  let h='<div class="card"><div class="section-label">Account Detail \u2014 '+accounts.length+' accounts</div><div style="overflow-x:auto"><table><thead><tr><th>Account</th><th>Start</th><th>Status</th><th>Reason</th><th>Reps</th></tr></thead><tbody>';
  sorted.forEach((a,i)=>{
    h+=`<tr><td style="font-weight:500">${a.name}</td><td class="muted" style="font-size:11px">${a.start}</td><td>${a.end?pillHTML('Churned '+a.end,'#ef4444'):pillHTML('Active','#5aab1f')}</td><td>${a.reason?pillHTML(a.reason,rsnCol(a.reason)):'<span class="muted">\u2014</span>'}</td><td class="muted" style="font-size:11px">${a.reps?a.reps.join(', '):'\u2014'}</td></tr>`;
  });
  h+='</tbody></table></div></div>';
  return h;
}

function personChartsHTML(prefix,accounts,perf){
  const crTrend=personCR(accounts);
  const moAc=personMonthly(accounts);
  const active=accounts.filter(a=>!a.end).length,lost=accounts.filter(a=>a.end).length,total=accounts.length;
  const cr=total?((lost/total)*100).toFixed(1):0;
  const latest=crTrend[crTrend.length-1];
  const avg12=crTrend.slice(-12);
  const avgCR=avg12.length?(avg12.reduce((s,d)=>s+d.cr,0)/avg12.length).toFixed(1):"-";
  const cs=churnScore(accounts);
  let h='<div class="stats">';
  h+=statHTML('Active Accounts',active,'#3a8c0f');
  h+=statHTML('Churned',lost,'#f87171');
  h+=statHTML('Acct Churn Rate',cr+'%',crCol(parseFloat(cr)),'churned / total');
  h+=statHTML('Latest Monthly CR',latest?latest.cr+'%':'-',crCol(latest?latest.cr:null),latest?latest.m:'');
  h+=statHTML('12-Mo Avg CR',avgCR+'%','#8dc63f');
  h+=statHTML('Churn Score',cs,cs<15?'#3a8c0f':cs<35?'#8dc63f':'#bcd97a','lower = better');
  h+='</div>';
  if(crTrend.length>0) h+=`<div class="card"><div class="section-label">Churn Rate Trend</div><div class="chart-wrap"><canvas id="${prefix}-cr" height="130"></canvas></div></div>`;
  if(moAc.length>0) h+=`<div class="card"><div class="section-label">Active Accounts Trend</div><div class="chart-wrap"><canvas id="${prefix}-ac" height="100"></canvas></div></div>`;
  if(perf&&perf.length>0) h+=`<div class="card"><div class="section-label">MQL / SQL / Meetings Trend</div><div class="chart-wrap"><canvas id="${prefix}-perf" height="130"></canvas></div></div>`;
  h+=accountTableHTML(accounts);

  setTimeout(()=>{
    if(crTrend.length>0) makeChart(prefix+'-cr',{type:'bar',data:{labels:crTrend.map(d=>d.m),datasets:[{data:crTrend.map(d=>d.cr),backgroundColor:crTrend.map(d=>crCol(d.cr)),borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+'%'}}},scales:{y:{ticks:{callback:v=>v+'%'}},x:{ticks:{font:{size:9}}}}}});
    if(moAc.length>0) makeChart(prefix+'-ac',{type:'line',data:{labels:moAc.map(d=>d.m),datasets:[{data:moAc.map(d=>d.ac),borderColor:'#34d399',borderWidth:2,fill:false,tension:0.3,pointRadius:0}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9}}}}}});
    if(perf&&perf.length>0) makeChart(prefix+'-perf',{type:'line',data:{labels:perf.map(d=>d.m),datasets:[{label:'MQLs',data:perf.map(d=>d.mql),borderColor:'#a78bfa',borderWidth:2,fill:false,tension:0.3,pointRadius:0},{label:'SQLs',data:perf.map(d=>d.sql),borderColor:'#38bdf8',borderWidth:2,fill:false,tension:0.3,pointRadius:0},{label:'Meetings',data:perf.map(d=>d.mtg||null),borderColor:'#34d399',borderWidth:2,fill:false,tension:0.3,pointRadius:0,spanGaps:true}]},options:{responsive:true,scales:{x:{ticks:{font:{size:9}}}}}});
  },50);
  return h;
}

// ── TAB RENDERING ──
function showTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{b.classList.toggle('active',['company','reps','soms','method'][i]===tab);});
  const c=document.getElementById('main-content');
  const titles={company:'Company <span>Overview</span>',reps:'Sales <span>Reps</span>',soms:'Sales <span>Ops Managers</span>',method:'Data <span>Methodology</span>'};
  let h=`<div class="page-title">${titles[tab]}</div><div class="title-bar"></div>`;
  if(tab==='company') h+=renderCompany();
  else if(tab==='reps') h+=renderReps();
  else if(tab==='soms') h+=renderSOMs();
  else if(tab==='method') h+=renderMethod();
  c.innerHTML=h;
  if(tab==='company') initCompanyCharts();
}

function renderCompany(){
  const r18=CD.slice(-18);const lat=CD[CD.length-1];const vCR=CD.filter(d=>d.cr!=null);
  const a6=(vCR.slice(-6).reduce((s,d)=>s+d.cr,0)/6).toFixed(2);
  const a12=(vCR.slice(-12).reduce((s,d)=>s+d.cr,0)/12).toFixed(2);
  let h='<div class="stats">';
  h+=statHTML('MRR \u2014 Mar 26',lat.mrr+'K','#5aab1f');
  h+=statHTML('Active Clients',lat.ac,'#0d0d0d');
  h+=statHTML('Lost This Month',lat.cl,'#ef4444');
  h+=statHTML('Churn Rate',lat.cr+'%',crCol(lat.cr),'3-mo trailing avg');
  h+=statHTML('6-Mo Avg',a6+'%','#8dc63f');
  h+=statHTML('12-Mo Avg',a12+'%','#5aab1f');
  h+=statHTML('Deals Closed',lat.dc,'#5aab1f');
  h+=statHTML('Net Change',(lat.dc-lat.cl>=0?'+':'')+(lat.dc-lat.cl),lat.dc-lat.cl>=0?'#5aab1f':'#ef4444');
  h+='</div>';
  h+=`<div class="card"><div class="section-label">Churn Rate % \u2014 Lost / Avg Active (prior 3 months)</div><div class="chart-wrap"><canvas id="co-cr" height="140"></canvas></div></div>`;
  h+=`<div class="card"><div class="section-label">MRR Trend \u2014 18 Months</div><div class="chart-wrap"><canvas id="co-mrr" height="120"></canvas></div></div>`;
  h+=`<div class="card"><div class="section-label">Active Clients</div><div class="chart-wrap"><canvas id="co-ac" height="110"></canvas></div></div>`;
  h+=`<div class="card"><div class="section-label">Closed vs Lost</div><div class="chart-wrap"><canvas id="co-cl" height="120"></canvas></div></div>`;
  h+=`<div class="card"><div class="section-label">Period Comparison</div><div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap"><div style="flex:1;min-width:140"><div class="stat-label">Period A</div><select id="pA" onchange="updateComparison()">${CD.map(d=>`<option value="${d.m}"${d.m==='Mar 25'?' selected':''}>${d.m}</option>`).join('')}</select></div><div style="flex:1;min-width:140"><div class="stat-label">Period B</div><select id="pB" onchange="updateComparison()">${CD.map(d=>`<option value="${d.m}"${d.m==='Mar 26'?' selected':''}>${d.m}</option>`).join('')}</select></div></div><div id="comp-table"></div></div>`;
  return h;
}

function initCompanyCharts(){
  const r18=CD.slice(-18);const crData=r18.filter(d=>d.cr!=null);
  makeChart('co-cr',{type:'bar',data:{labels:crData.map(d=>d.m),datasets:[{data:crData.map(d=>d.cr),backgroundColor:crData.map(d=>crCol(d.cr)),borderRadius:3}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+'%'}}},scales:{y:{ticks:{callback:v=>v+'%'}},x:{ticks:{font:{size:9}}}}}});
  makeChart('co-mrr',{type:'line',data:{labels:r18.map(d=>d.m),datasets:[{data:r18.map(d=>d.mrr),borderColor:'#5aab1f',borderWidth:2.5,fill:false,tension:0.3,pointRadius:0}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.raw+'K'}}},scales:{y:{ticks:{callback:v=>v+'K'}},x:{ticks:{font:{size:9}}}}}});
  makeChart('co-ac',{type:'line',data:{labels:r18.map(d=>d.m),datasets:[{data:r18.map(d=>d.ac),borderColor:'#38bdf8',borderWidth:2.5,fill:false,tension:0.3,pointRadius:0}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9}}}}}});
  makeChart('co-cl',{type:'bar',data:{labels:r18.map(d=>d.m),datasets:[{label:'Closed',data:r18.map(d=>d.dc),backgroundColor:'#5aab1f',borderRadius:3},{label:'Lost',data:r18.map(d=>d.cl),backgroundColor:'#ef4444',borderRadius:3}]},options:{responsive:true,scales:{x:{ticks:{font:{size:9}}}}}});
  updateComparison();
}

function updateComparison(){
  const a=document.getElementById('pA').value,b=document.getElementById('pB').value;
  const rA=CD.find(d=>d.m===a),rB=CD.find(d=>d.m===b);
  if(!rA||!rB)return;
  const dlt=(k)=>{if(rA[k]==null||rB[k]==null)return null;const d=rB[k]-rA[k];return{v:d,pct:((d/rA[k])*100).toFixed(1)};};
  const rows=[{l:'MRR',k:'mrr',f:v=>v+'K',bad:false},{l:'Active Clients',k:'ac',f:v=>v,bad:false},{l:'Deals Closed',k:'dc',f:v=>v,bad:false},{l:'Contracts Lost',k:'cl',f:v=>v,bad:true},{l:'Churn %',k:'cr',f:v=>v!=null?v+'%':'\u2014',bad:true},{l:'EBITDA',k:'eb',f:v=>v+'K',bad:false}];
  let h='<table><thead><tr><th>Metric</th><th>A</th><th>B</th><th>Delta</th></tr></thead><tbody>';
  rows.forEach(row=>{
    const d=dlt(row.k);const clr=d?((row.bad?(d.v<0):(d.v>0))?'#5aab1f':(row.bad?(d.v>0):(d.v<0))?'#ef4444':'#707070'):'#707070';
    h+=`<tr><td class="muted">${row.l}</td><td>${row.f(rA[row.k])}</td><td>${row.f(rB[row.k])}</td><td style="color:${clr};font-weight:700">${d?(d.v>0?'+':'')+(typeof d.v==='number'&&!Number.isInteger(d.v)?d.v.toFixed(2):d.v)+' ('+d.pct+'%)':'\u2014'}</td></tr>`;
  });
  h+='</tbody></table>';
  document.getElementById('comp-table').innerHTML=h;
}

function renderSOMs(){
  let h='<div style="margin-bottom:20px"><div class="stat-label">Select Sales Ops Manager</div><select id="som-sel" onchange="loadSOM()"><option value="">\u2014 Choose a SOM \u2014</option>';
  SOMS.forEach(s=>{h+=`<option value="${s.name}">${s.name}</option>`;});
  h+='</select></div><div id="som-content"><div class="placeholder">Select a SOM above to load their dashboard.</div></div>';
  return h;
}

function loadSOM(){
  const name=document.getElementById('som-sel').value;
  const el=document.getElementById('som-content');
  if(!name){el.innerHTML='<div class="placeholder">Select a SOM above to load their dashboard.</div>';return;}
  const som=SOMS.find(s=>s.name===name);
  let h=`<div class="som-header"><div class="som-name">${som.name}</div><div class="som-meta"><span style="color:#5aab1f;font-weight:700">${som.accounts.filter(a=>!a.end).length}</span> active accounts \u00B7 <span style="color:#ef4444;font-weight:700">${som.accounts.filter(a=>a.end).length}</span> churned</div></div>`;
  h+=personChartsHTML('som',som.accounts,som.perf);
  h+=`<div class="card"><div class="section-label">SEs in Portfolio</div><div class="pills-wrap">${som.reps.map(r=>pillHTML(r,'#5aab1f')).join('')}</div></div>`;
  el.innerHTML=h;
}

function renderReps(){
  let h='<div style="margin-bottom:20px"><div class="stat-label">Select Rep</div><select id="rep-sel" onchange="loadRep()"><option value="">\u2014 Choose a rep \u2014</option>';
  ALL_REPS.forEach(r=>{h+=`<option value="${r}">${r}</option>`;});
  h+='</select></div><div id="rep-content"><div class="placeholder">Select a rep above to load their dashboard.</div></div>';
  return h;
}

function loadRep(){
  const name=document.getElementById('rep-sel').value;
  const el=document.getElementById('rep-content');
  if(!name){el.innerHTML='<div class="placeholder">Select a rep above to load their dashboard.</div>';return;}
  const accs=getRepAccounts(name);
  const somN=[...new Set(accs.map(a=>a.som))];
  let h=`<div class="som-header"><div class="som-name">${name}</div><div class="som-meta">Sales Execution Rep \u00B7 <span style="color:#5aab1f;font-weight:700">${accs.filter(a=>!a.end).length}</span> active accounts \u00B7 ${somN.join(', ')||'\u2014'}</div></div>`;
  if(accs.length>0) h+=personChartsHTML('rep',accs,null);
  else h+='<div class="card muted">No account assignments found for this rep.</div>';
  el.innerHTML=h;
}
